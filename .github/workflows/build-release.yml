name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: 1.4.309.0
          install_runtime: true
          cache: true
          stripdown: true

      - name: Configure
        run: >
          cmake -B build
          -G "Visual Studio 17 2022" -A x64
          -DDLSS_SDK_ROOT=DLSS

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Determine version string
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -match "^refs/tags/(.+)$") {
            $ver = $Matches[1]
          } else {
            $ver = "${{ github.sha }}".Substring(0, 8)
          }
          "VERSION=$ver" | Out-File -Append $env:GITHUB_OUTPUT

      - name: Verify package inputs
        shell: pwsh
        run: |
          $required = @(
            "build\Release\dlss-compositor.exe",
            "build\Release\nvngx_dlssd.dll",
            "build\Release\nvngx_dlssg.dll"
          )

          foreach ($file in $required) {
            if (-not (Test-Path $file)) {
              Write-Error "Required file not found: $file"
            }
          }

      - name: Package
        id: package
        shell: pwsh
        run: |
          $dist = "dlss-compositor-${{ steps.version.outputs.VERSION }}-win64"
          New-Item -ItemType Directory -Path $dist -Force | Out-Null

          Copy-Item "build\Release\dlss-compositor.exe" $dist
          Copy-Item "build\Release\nvngx_dlssd.dll"     $dist
          Copy-Item "build\Release\nvngx_dlssg.dll"     $dist

          if (Test-Path "LICENSE")   { Copy-Item "LICENSE"   $dist }
          if (Test-Path "README.md") { Copy-Item "README.md" $dist }

          Compress-Archive -Path "$dist\*" -DestinationPath "$dist.zip" -Force
          "ARTIFACT_NAME=$dist"    | Out-File -Append $env:GITHUB_OUTPUT
          "ARTIFACT_ZIP=$dist.zip" | Out-File -Append $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.ARTIFACT_NAME }}
          path: ${{ steps.package.outputs.ARTIFACT_ZIP }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.ARTIFACT_ZIP }}
          generate_release_notes: true